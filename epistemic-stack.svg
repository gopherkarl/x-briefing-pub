<svg width="720" height="460" viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for drop shadows, gradients and arrows -->
    <defs>
        <!-- Card Drop Shadow -->
        <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
        <!-- Neon Glow Filters -->
        <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Gradients -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#08080c" />
            <stop offset="100%" stop-color="#14141d" />
        </linearGradient>
        <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#181822" />
            <stop offset="100%" stop-color="#1f1f2e" />
        </linearGradient>

        <!-- Marker Arrows -->
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#F43F5E" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981" />
        </marker>
    </defs>

    <!-- Background Canvas -->
    <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#1f1f2e" stroke-width="1.5" />
    
    <!-- Title and Core Frame -->
    <text x="360" y="36" fill="#ffffff" font-family="system-ui, -apple-system" font-size="16" font-weight="600" letter-spacing="0.05em" text-anchor="middle">MY PERSONAL EPISTEMIC HARNESS</text>
    <text x="360" y="54" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system" font-size="11" text-anchor="middle">A Closed-Loop Secure System Shielding Enterprise Alpha</text>

    <!-- ================= PILLAR 2 (TOP LAYER): VALIDATION ================= -->
    <g transform="translate(100, 80)">
        <rect width="520" height="85" rx="12" fill="url(#card-grad)" stroke="#F43F5E" stroke-width="1.5" filter="url(#card-shadow)" />
        <!-- Badge -->
        <rect x="18" y="16" width="64" height="18" rx="4" fill="rgba(244,63,94,0.1)" stroke="rgba(244,63,94,0.3)" stroke-width="1"/>
        <text x="50" y="29" fill="#F43F5E" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">PILLAR 2</text>
        
        <!-- Header Text -->
        <text x="96" y="29" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">CRITICISM ENGINE (Private Evaluations)</text>
        <text x="96" y="44" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="10.5">Automated validation suites acting as the filter to detect and eliminate model errors.</text>
        
        <!-- Nodes/Features inside Layer -->
        <g transform="translate(18, 54)">
            <!-- Item 1 -->
            <rect x="0" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="10" cy="10" r="3" fill="#F43F5E" filter="url(#glow-red)" />
            <text x="22" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Golden Task Evals</text>

            <!-- Item 2 -->
            <rect x="166" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="176" cy="10" r="3" fill="#F43F5E" filter="url(#glow-red)" />
            <text x="188" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Closed-Loop Metrics</text>

            <!-- Item 3 -->
            <rect x="332" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="342" cy="10" r="3" fill="#F43F5E" filter="url(#glow-red)" />
            <text x="354" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Model Defect Routing</text>
        </g>
    </g>

    <!-- ================= PILLAR 1 (MIDDLE LAYER): SOFTWARE ================= -->
    <g transform="translate(100, 195)">
        <rect width="520" height="85" rx="12" fill="url(#card-grad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#card-shadow)" />
        <!-- Badge -->
        <rect x="18" y="16" width="64" height="18" rx="4" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
        <text x="50" y="29" fill="#3B82F6" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">PILLAR 1</text>
        
        <!-- Header Text -->
        <text x="96" y="29" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">CONTEXT &amp; PROCEDURAL MEMORY (Software)</text>
        <text x="96" y="44" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="10.5">Structuring and compiling localized reality, interlinked notes, and execution skills.</text>
        
        <!-- Nodes/Features inside Layer -->
        <g transform="translate(18, 54)">
            <!-- Item 1 -->
            <rect x="0" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="10" cy="10" r="3" fill="#3B82F6" filter="url(#glow-blue)" />
            <text x="22" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Obsidian Vault Index</text>

            <!-- Item 2 -->
            <rect x="166" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="176" cy="10" r="3" fill="#3B82F6" filter="url(#glow-blue)" />
            <text x="188" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Semantic Context Assembly</text>

            <!-- Item 3 -->
            <rect x="332" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="342" cy="10" r="3" fill="#3B82F6" filter="url(#glow-blue)" />
            <text x="354" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Hermes Action Skills</text>
        </g>
    </g>

    <!-- ================= PILLAR 3 (BOTTOM LAYER): SUBSTRATE ================= -->
    <g transform="translate(100, 310)">
        <rect width="520" height="85" rx="12" fill="url(#card-grad)" stroke="#10B981" stroke-width="1.5" filter="url(#card-shadow)" />
        <!-- Badge -->
        <rect x="18" y="16" width="64" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
        <text x="50" y="29" fill="#10B981" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">PILLAR 3</text>
        
        <!-- Header Text -->
        <text x="96" y="29" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">EDGE COMPUTE &amp; PRIVACY (Substrate)</text>
        <text x="96" y="44" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="10.5">Physical silicon substrate locking weights locally to eliminate network data leakage.</text>
        
        <!-- Nodes/Features inside Layer -->
        <g transform="translate(18, 54)">
            <!-- Item 1 -->
            <rect x="0" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="10" cy="10" r="3" fill="#10B981" filter="url(#glow-green)" />
            <text x="22" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Apple Silicon Neural Engine</text>

            <!-- Item 2 -->
            <rect x="166" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="176" cy="10" r="3" fill="#10B981" filter="url(#glow-green)" />
            <text x="188" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Local Ollama Backend</text>

            <!-- Item 3 -->
            <rect x="332" y="0" width="150" height="20" rx="4" fill="#14141d" stroke="rgba(255,255,255,0.06)" />
            <circle cx="342" cy="10" r="3" fill="#10B981" filter="url(#glow-green)" />
            <text x="354" y="13" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="9.5">Open-Weights Models</text>
        </g>
    </g>

    <!-- ================= FLOW ARROWS (Secure Local Loop) ================= -->
    <!-- Downward context flow on the left: Pillar 1 (Memory) -> Pillar 3 (Model) -->
    <path d="M 80 237 C 40 237, 40 352, 100 352" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-blue)" />
    <text x="30" y="295" fill="#3B82F6" font-family="system-ui" font-size="9.5" text-anchor="middle" transform="rotate(-90 30 295)">Context Injection</text>

    <!-- Upward conjecture flow on the right: Pillar 3 (Compute) -> Pillar 2 (Evals) -->
    <path d="M 620 352 C 670 352, 670 122, 606 122" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-green)" />
    <text x="682" y="237" fill="#10B981" font-family="system-ui" font-size="9.5" text-anchor="middle" transform="rotate(90 682 237)">Model Conjectures</text>

    <!-- Feedback / correction loop: Pillar 2 (Evals) -> Pillar 1 (Memory) -->
    <path d="M 360 165 L 360 187" fill="none" stroke="#F43F5E" stroke-width="1.5" marker-end="url(#arrow-red)" />
    <rect x="303" y="167" width="114" height="15" rx="3" fill="#181822" stroke="rgba(244,63,94,0.2)" stroke-width="1" />
    <text x="360" y="177" fill="#F43F5E" font-family="system-ui" font-size="8.5" font-weight="600" text-anchor="middle">Error Correction Loop</text>

</svg>
